<!DOCTYPE html>

        html.dark-mode .mod-mu h3 { color:#60a5fa; } html.dark-mode .mod-mu p { color:#93c5fd; }
        html.dark-mode .mod-o h3  { color:#fca5a5; } html.dark-mode .mod-o p  { color:#fecaca; }
        html.dark-mode .mod-q h3  { color:#a5b4fc; } html.dark-mode .mod-q p  { color:#c7d2fe; }
        html.dark-mode .mod-c h3  { color:#fbbf24; } html.dark-mode .mod-c p  { color:#fcd34d; }

        .detail-section:last-child { border-bottom: none; }
        .detail-section h3 { font-size: 1rem; color: var(--accent-color); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .section-marker { width: 0.25rem; height: 1.2rem; background: var(--accent-color); border-radius: 9999px; flex-shrink: 0; }
        .detail-section p { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.6; margin-left: 0.75rem; }
        .instruments-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 0.6rem; margin: 0.8rem 0 0 0.75rem; }
        .instrument-card { background: rgba(29,158,117,0.05); border: 1px solid var(--border-color); border-radius: 0.6rem; padding: 0.6rem; }
        .instrument-card h5 { font-size: 0.72rem; color: var(--accent-color); margin-bottom: 0.2rem; font-family: 'Playfair Display', serif; }
        .instrument-card p  { font-size: 0.67rem; color: var(--text-secondary); line-height: 1.4; }
        .detail-btn {
            width: 100%; background: var(--accent-color); color: white; border: none;
            padding: 0.75rem; border-radius: 0.75rem; font-size: 0.95rem;
            font-weight: 600; cursor: pointer; margin-top: 1.2rem; transition: background 0.2s;
        }
        .detail-btn:hover { background: #0F6E56; }

        .audio-player {
            background: rgba(29,158,117,0.06); border: 1px solid var(--border-color);
            border-radius: 0.75rem; padding: 0.9rem; margin: 0.8rem 0 0 0.75rem;
        }
        .audio-player h4 { font-size: 0.8rem; color: var(--accent-color); margin-bottom: 0.5rem; font-family: 'Playfair Display', serif; }
        .audio-controls { display: flex; align-items: center; gap: 0.75rem; }
        .audio-play-btn {
            background: var(--accent-color); color: white; border: none;
            width: 2.2rem; height: 2.2rem; border-radius: 50%; cursor: pointer;
            font-size: 0.9rem; flex-shrink: 0; transition: background 0.2s;
        }
        .audio-play-btn:hover { background: #0F6E56; }
        .audio-info p { font-size: 0.72rem; color: var(--text-secondary); margin: 0.15rem 0; }
        .audio-pendiente {
            background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.3);
            border-radius: 0.5rem; padding: 0.5rem 0.75rem;
            font-size: 0.72rem; color: #b45309; margin: 0.4rem 0 0 0.75rem;
        }
        html.dark-mode .audio-pendiente { color: #fcd34d; }

        .form-group { margin-bottom: 0.9rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--accent-color); margin-bottom: 0.4rem; }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%; padding: 0.6rem; border: 1px solid var(--border-color);
            border-radius: 0.5rem; font-size: 0.82rem; font-family: 'Inter', sans-serif;
            background: var(--bg-secondary); color: var(--text-primary); transition: border-color 0.2s;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus { outline: none; border-color: var(--accent-color); }
        .form-group textarea { min-height: 5rem; resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
        .form-submit {
            width: 100%; background: var(--accent-color); color: white; border: none;
            padding: 0.75rem; border-radius: 0.75rem; font-size: 0.95rem;
            font-weight: 600; cursor: pointer; margin-top: 0.8rem; transition: background 0.2s;
        }
        .form-submit:hover { background: #0F6E56; }
        .form-success {
            background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3);
            border-radius: 0.75rem; padding: 0.9rem; margin-bottom: 0.9rem;
            color: #15803d; font-size: 0.85rem; display: none;
        }
        html.dark-mode .form-success { color: #86efac; }
        .form-success.show { display: block; }
        .form-error {
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
            border-radius: 0.75rem; padding: 0.9rem; margin-bottom: 0.9rem;
            color: #dc2626; font-size: 0.85rem; display: none;
        }
        .form-error.show { display: block; }
        .social-share-section {
            background: rgba(29,158,117,0.05); border: 1px solid var(--border-color);
            border-radius: 0.75rem; padding: 0.9rem; margin: 1.2rem 0; text-align: center;
        }
        .social-share-section h4 { font-size: 0.82rem; color: var(--accent-color); margin-bottom: 0.6rem; }
        .share-btns { display: flex; justify-content: center; gap: 0.6rem; }
        .share-btn {
            width: 2.8rem; height: 2.8rem; border-radius: 50%; border: none;
            cursor: pointer; font-size: 1.3rem; display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .share-btn:hover { transform: scale(1.1); }
        .s-wa { background: #25D366; color: white; }
        .s-fb { background: #1877F2; color: white; font-weight: 700; font-size: 1rem; }
        .s-tw { background: #1DA1F2; color: white; font-weight: 700; font-size: 0.9rem; }

        .perfil-avatar {
            width: 90px; height: 90px; border-radius: 50%;
            background: linear-gradient(135deg,#1D9E75,#0F6E56);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem; font-size: 2.5rem;
        }
        .perfil-cita {
            background: linear-gradient(to right,rgba(79,70,229,0.08),rgba(79,70,229,0.04));
            border-radius: 0.75rem; padding: 1rem;
            border: 1px solid rgba(79,70,229,0.2);
            margin-bottom: 1.2rem; font-size: 0.88rem;
            line-height: 1.7; color: var(--text-primary);
            font-style: italic; text-align: center;
        }
        .perfil-badge {
            display: inline-block; background: linear-gradient(135deg,#1D9E75,#0F6E56);
            color: white; font-size: 0.72rem; font-weight: 600;
            padding: 0.3rem 0.9rem; border-radius: 20px; margin: 0.2rem;
        }
        .perfil-cta {
            background: linear-gradient(135deg,#1D9E75,#0F6E56);
            border-radius: 0.75rem; padding: 1.2rem; text-align: center; margin: 1rem 0;
        }
        .perfil-cta p { color: white; font-size: 0.82rem; font-weight: 600; margin-bottom: 0.6rem; }
        .perfil-cta button {
            background: white; color: #1D9E75; border: none;
            padding: 0.6rem 1.5rem; border-radius: 0.5rem;
            font-weight: 700; font-size: 0.85rem; cursor: pointer;
        }
    </style>
</head>
<body>
<div class="app-container">

    <!-- PANTALLA INICIO -->
    <div id="homeScreen">
        <header class="app-header">
            <div>
                <h1>Mi Pacífico App</h1>
                <p>Patrimonio digital del litoral</p>
                <p style="font-size:0.65rem;margin-top:0.2rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;">Mg. Luis Eduardo Rodallegas</p>
            </div>
            <div class="header-btns">
                <button class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema">🌙</button>
                <button class="social-btn btn-wa" onclick="contactarWhatsApp()" title="WhatsApp">💬</button>
                <button class="social-btn btn-fb" onclick="compartirFacebook()" title="Facebook">f</button>
            </div>
        </header>
        <div style="padding-bottom:2rem;">
            <div class="modules-grid">
                <button class="module-btn mod-g" onclick="showModule('gastronomia')">
                    <div class="emoji">🍽️</div><h3>Gastronomía</h3><p>Recetas y sabores</p>
                </button>
                <button class="module-btn mod-m" onclick="showModule('medicina')">
                    <div class="emoji">🌿</div><h3>Medicina</h3><p>Plantas ancestrales</p>
                </button>
                <button class="module-btn mod-mu" onclick="showModule('musica')">
                    <div class="emoji">🎵</div><h3>Música</h3><p>Danzas y ritmos</p>
                </button>
                <button class="module-btn mod-o" onclick="showModule('oral')">
                    <div class="emoji">📖</div><h3>Tradición Oral</h3><p>Historias de mayores</p>
                </button>
                <button class="module-btn mod-q" onclick="showModule('quienes')">
                    <div class="emoji">👨‍🏫</div><h3>Quiénes somos</h3><p>El proyecto y su autor</p>
                </button>
                <button class="module-btn mod-c" onclick="showModule('contact')">
                    <div class="emoji">✉️</div><h3>Comparte</h3><p>Tu historia y aportes</p>
                </button>
            </div>
            <div class="footer-txt">
                <p>Río Naya · Valle del Cauca</p>
                <p style="color:var(--accent-color);font-weight:600;margin-top:0.4rem;">✓ Patrimonio Digital Preservado</p>

    <!-- PANTALLA DETALLE -->

                <p id="detailSubtitle"></p>

            <div id="detailSections"></div>

</div>
<script>
let currentAudio = null;
const appUrl = window.location.href;
const FORMSPREE_URL = 'https://formspree.io/f/meevlzgb';

const modules = {
    gastronomia: {
        title: "Gastronomía",
        subtitle: "Saberes culinarios del litoral Pacífico",
        image: "https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=800&q=80",
        description: "La cocina del Pacífico es soberanía alimentaria y relación profunda con el ecosistema de manglar y río. Recetas documentadas con las comunidades del río Naya, usando ingredientes locales como el naidí, el chontaduro y las hierbas de azotea.",
        sections: [
            { title: "Platos emblemáticos", content: "El encocao (pescado en leche de coco), la sopa de piangua, el tapao de pescado y el arroz con piangua son los platos bandera de la región. Cada uno cuenta historias de tradición y conexión con el manglar." },
            { title: "Ingredientes locales", content: "Naidí (fruto de palma), chontaduro, piangua (molusco de manglar), pescado de río y mar. Todos son parte de la identidad culinaria del territorio y expresión de la biodiversidad del Pacífico." },
            { title: "Hierbas de azotea", content: "Cilantro cimarrón, poleo, albahaca negra, orégano de hoja ancha. Son el alma de la sazón pacífica, cultivadas en espacios elevados para protegerlas de inundaciones." },
            { title: "Contenido en construcción", content: "Este módulo se está documentando directamente con las comunidades del río Naya. Próximamente más recetas, videos y testimonios de las cocineras tradicionales del territorio." }
        ]
    },
    medicina: {
        title: "Medicina Tradicional",
        subtitle: "Etnobotánica y saberes ancestrales del Naya",
        image: "https://images.unsplash.com/photo-1416879595882-3373a0480b5b?w=800&q=80",
        description: "Las parteras, los sabedores y las plantas de azotea son el sistema de salud ancestral del Pacífico. Este módulo recoge conocimientos de etnobotánica del río Naya, validados con los sabedores del territorio.",
        sections: [
            { title: "La azotea: espacio de vida", content: "Espacio elevado donde las mujeres siembran plantas medicinales y condimentos. Protege la biodiversidad de inundaciones y es centro de transmisión de saberes generacionales entre mujeres de la comunidad." },
            { title: "Plantas medicinales", content: "Poleo (dolores estomacales), albahaca (limpiezas espirituales), paico (antiparasitario natural), verbena (para la sangre y presión), suelda con suelda (cicatrizante). Cada planta tiene un propósito específico." },
            { title: "Sabedores y parteras", content: "Figuras clave que preservan el conocimiento etnobotánico. Su labor es fundamental para mantener viva la tradición de curación y cuidado de la salud comunitaria en zonas donde el acceso al sistema formal es limitado." },
            { title: "Contenido en construcción", content: "Este módulo se está documentando con parteras y sabedores del río Naya. Próximamente fichas de plantas con usos, preparaciones y fotografías del territorio." }
        ]
    },
    musica: {
        title: "Música y Danzas",
        subtitle: "Expresiones ancestrales del Pacífico colombiano",
        image: "https://images.unsplash.com/photo-1511192336575-5a79af67a629?w=800&q=80",
        description: "Los estudios folclóricos en la región Pacífica revelan supervivencias afroamericanas, españolas e indígenas en sus cantos. Las músicas de marimba y los cantos tradicionales del Pacífico Sur son Patrimonio Inmaterial de la Humanidad — UNESCO 2015.",
        sections: [
            { title: "Conjunto de Marimba", content: "Currulao (el más sagrado) · Bambuco viejo · Bereju · Pango marabajeño · Patacore · Juga · Bunde. Cada ritmo tiene su propia historia, su propio contexto ritual y su significado cultural profundo." },
            { title: "Conjunto de Chirimía", content: "Levanta polvo · Abozao · Polka · Pasillo chocoano. Fusión de tradición afrodescendiente e influencia de instrumentos de viento europeos en el Pacífico norte.", hasAudio: true },
            { title: "Conjunto Libre", content: "Fusión musical de todos los ritmos tradicionales del Pacífico colombiano con otros instrumentos del interior o exterior del país. Expresión viva de la cultura en permanente evolución." },
            { title: "Instrumentos tradicionales", content: "El conjunto de marimba es Patrimonio de la Humanidad. La marimba de chonta tiene 22 teclas y resonadores de guadua. Los cununos y bombos marcan el ritmo ancestral.",
                instruments: [
                    { name: "Marimba de Chonta", desc: "22 teclas de madera y tubos de guadua. Piano de la selva." },
                    { name: "Cununo", desc: "Tambor cilíndrico de madera y piel de venado. Macho y hembra." },
                    { name: "Bombo", desc: "Percusión de dos membranas. Macho (golpeador) y hembra (arrulladora)." },
                    { name: "Guasá", desc: "Tubo de guadua con semillas secas. Instrumento de ritmo." }
                ]
            },
            { title: "Bailes y danzas", content: "Danza de pañuelo: Currulao, Bambuco viejo, Bunde, Juga cruzada. Danza de movimiento: Jota chocoana, El pizón, Contradanza, Abozao, Tamborito, Redondel." },

function showModule(id) {
    const m = modules[id];
    document.getElementById('homeScreen').style.display = 'none';
    document.getElementById('detailScreen').classList.add('active');
    const dh = document.getElementById('detailHeader');
    const iw = document.getElementById('detailImgWrap');

    if (m.isQuienes) {
        dh.className = 'detail-header quienes-hdr';
        document.getElementById('detailTitle').textContent = m.title;
        document.getElementById('detailSubtitle').textContent = m.subtitle;
        iw.style.display = 'none';
        document.getElementById('detailDesc').innerHTML = '';
        document.getElementById('detailSections').innerHTML = buildQuienesSomos();
        window.scrollTo(0, 0);
        return;
    }

    if (m.isContact) {
        dh.className = 'detail-header contact-hdr';
        document.getElementById('detailTitle').textContent = m.title;
        document.getElementById('detailSubtitle').textContent = m.subtitle;
        iw.style.display = 'none';
        document.getElementById('detailDesc').innerHTML = '<p>Ayuda a preservar el patrimonio cultural del Río Naya compartiendo tus recetas, plantas medicinales, historias y tradiciones del Pacífico. Cada aporte enriquece este archivo digital colectivo.</p>';
        document.getElementById('detailSections').innerHTML = buildContactForm();
        window.scrollTo(0, 0);
        return;
    }

    dh.className = 'detail-header';
    document.getElementById('detailTitle').textContent = m.title;
    document.getElementById('detailSubtitle').textContent = m.subtitle;
    iw.style.display = 'block';
    document.getElementById('detailImg').src = m.image;
    document.getElementById('detailImg').alt = m.title;
    document.getElementById('detailDesc').textContent = m.description;

    let html = '';
    m.sections.forEach(s => {
        html += `<div class="detail-section"><h3><span class="section-marker"></span>${s.title}</h3><p>${s.content}</p>`;
        if (s.hasAudio) {
            html += `
            <div class="audio-player">
                <h4>🎵 Reproducir muestra musical</h4>
                <div class="audio-controls">
                    <button class="audio-play-btn" onclick="this.textContent = this.textContent === '▶' ? '⏸' : '▶'">▶</button>
                    <div class="audio-info">
                        <p style="font-weight:600;">Chirimía del Pacífico</p>
                        <p>Muestra de audio del territorio</p>
                    </div>
                </div>
            </div>
            <p class="audio-pendiente">⏳ Audios del territorio en proceso de grabación con la comunidad del río Naya</p>`;
        }
        if (s.instruments) {
            html += '<div class="instruments-grid">';
            s.instruments.forEach(i => html += `<div class="instrument-card"><h5>${i.name}</h5><p>${i.desc}</p></div>`);
            html += '</div>';
        }
        html += '</div>';
    });
    document.getElementById('detailSections').innerHTML = html;
    window.scrollTo(0, 0);
}

async function enviarFormulario() {
    const name    = document.getElementById('f-name').value.trim();
    const email   = document.getElementById('f-email').value.trim();
    const cat     = document.getElementById('f-cat').value;
    const title   = document.getElementById('f-title').value.trim();
    const content = document.getElementById('f-content').value.trim();
    const location= document.getElementById('f-location').value.trim();
    if (!name || !email || !cat || !title || !content) {
        alert('Por favor completa todos los campos obligatorios (*)');
        return;
    }
    const btn = document.querySelector('.form-submit');
    btn.textContent = 'Enviando...';
    btn.disabled = true;
    try {
        const res = await fetch(FORMSPREE_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({ name, email, categoria: cat, titulo: title, descripcion: content, lugar: location })
        });
        if (res.ok) {
            document.getElementById('formSuccess').classList.add('show');
            ['f-name','f-email','f-cat','f-title','f-content','f-location'].forEach(id => document.getElementById(id).value = '');
        } else {
            document.getElementById('formError').classList.add('show');
        }
    } catch(e) {
        document.getElementById('formError').classList.add('show');
    } finally {
        btn.textContent = 'Enviar aporte al patrimonio';
        btn.disabled = false;
    }
}

function goHome() {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    document.getElementById('detailScreen').classList.remove('active');
    document.getElementById('homeScreen').style.display = 'block';
    window.scrollTo(0, 0);
}
