        .quiz-opcion:hover:not(:disabled) { border-color: var(--accent-color); background: rgba(29,158,117,0.08); }
        .quiz-opcion.correcta { background: #E1F5EE; border-color: #1D9E75; color: #085041; font-weight: 600; }
        .quiz-opcion.incorrecta { background: #FAECE7; border-color: #D85A30; color: #712B13; }

        .quiz-feedback.ok  { background: #E1F5EE; color: #085041; border: 1px solid #1D9E75; }

        .form-error.show { display: block; }
        .social-share-section { background: rgba(29,158,117,0.05); border: 1px solid var(--border-color); border-radius: 0.75rem; padding: 0.9rem; margin: 1.2rem 0; text-align: center; }
        .social-share-section h4 { font-size: 0.82rem; color: var(--accent-color); margin-bottom: 0.6rem; }

        .share-btn:hover { transform: scale(1.1); }
        .s-wa { background: #25D366; color: white; }
        .s-fb { background: #1877F2; color: white; font-weight: 700; font-size: 1rem; }
        .s-tw { background: #1DA1F2; color: white; font-weight: 700; font-size: 0.9rem; }
        .perfil-avatar { width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(135deg,#1D9E75,#0F6E56); display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 2.5rem; }
        .perfil-cita { background: linear-gradient(to right,rgba(79,70,229,0.08),rgba(79,70,229,0.04)); border-radius: 0.75rem; padding: 1rem; border: 1px solid rgba(79,70,229,0.2); margin-bottom: 1.2rem; font-size: 0.88rem; line-height: 1.7; color: var(--text-primary); font-style: italic; text-align: center; }
        .perfil-badge { display: inline-block; background: linear-gradient(135deg,#1D9E75,#0F6E56); color: white; font-size: 0.72rem; font-weight: 600; padding: 0.3rem 0.9rem; border-radius: 20px; margin: 0.2rem; }

<body>
<div class="app-container">
    <div id="homeScreen">
        <header class="app-header">
            <div>
                <h1>Mi Pacífico App</h1>

            </div>

                <button class="module-btn mod-m" onclick="showModule('medicina')"><div class="emoji">🌿</div><h3>Medicina</h3><p>Plantas ancestrales</p></button>
                <button class="module-btn mod-mu" onclick="showModule('musica')"><div class="emoji">🎵</div><h3>Música</h3><p>Danzas y ritmos</p></button>

<script>
const appUrl = window.location.href;
const FORMSPREE_URL = 'https://formspree.io/f/meevlzgb';

const preguntasQuiz = [
    { p:"¿Cuál es el instrumento principal del conjunto de marimba?", ops:["Guasá","Marimba de chonta","Cununo","Bombo"], c:1, ex:"La marimba de chonta tiene 22 teclas de madera y resonadores de guadua. Es el piano de la selva." },
    { p:"¿En qué ciudad se celebra cada agosto el Festival Petronio Álvarez?", ops:["Buenaventura","Bogotá","Cali","Quibdó"], c:2, ex:"El Festival Petronio Álvarez se celebra en Cali cada agosto, en honor a Petronio Álvarez Quintero (1914–1966)." },
    { p:"¿Cuál de estos ritmos pertenece al conjunto de Chirimía?", ops:["Currulao","Abozao","Bunde","Juga"], c:1, ex:"El Abozao es un ritmo del conjunto de Chirimía, más frenético y bailable que los ritmos de marimba." },
    { p:"¿Qué representa el Currulao en la cultura del Pacífico?", ops:["Carnaval","Ritual fúnebre","Danza de cortejo","Canción de cuna"], c:2, ex:"El Currulao es la danza más sagrada. Es danza de cortejo con pañuelos y símbolo de cohesión social." },
    { p:"¿De qué material son los resonadores de la marimba de chonta?", ops:["Madera de balso","Tubos de guadua","Piel de venado","Semillas secas"], c:1, ex:"Los resonadores son tubos de guadua (bambú nativo de Colombia)." },
    { p:"¿Cuál de estos es un instrumento de percusión del Pacífico?", ops:["Violín","Flauta","Cununo","Guitarra"], c:2, ex:"El Cununo es un tambor cilíndrico de madera y piel de venado. Existe el macho (grave) y la hembra (aguda)." },
    { p:"¿Qué tipo de danza es el Bambuco Viejo?", ops:["Danza de movimiento","Danza de pañuelo","Danza de carnaval","Danza ritual"], c:1, ex:"El Bambuco Viejo es una danza de pañuelo, uno de los ritmos más tradicionales del conjunto de marimba." }
];
let qActual=0, qPuntaje=0, qRespondido=false;

function abrirQuiz(){
    qActual=0; qPuntaje=0; qRespondido=false;
    document.getElementById('quiz-box').classList.add('visible');
    document.getElementById('quiz-resultado').classList.remove('show');
    cargarPregunta();
}
function cargarPregunta(){
    qRespondido=false;
    const p=preguntasQuiz[qActual];
    document.getElementById('quiz-num').textContent=`Pregunta ${qActual+1} de ${preguntasQuiz.length}`;
    document.getElementById('quiz-pregunta').textContent=p.p;
    document.getElementById('quiz-feedback').className='quiz-feedback';
    document.getElementById('quiz-btn-sig').className='quiz-btn-sig';
    const cont=document.getElementById('quiz-opciones');
    cont.innerHTML='';
    p.ops.forEach((op,i)=>{
        const btn=document.createElement('button');
        btn.className='quiz-opcion'; btn.textContent=op;
        btn.onclick=()=>responderQuiz(i);
        cont.appendChild(btn);
    });
}
function responderQuiz(idx){
    if(qRespondido)return;
    qRespondido=true;
    const p=preguntasQuiz[qActual];
    const bots=document.querySelectorAll('.quiz-opcion');
    bots.forEach(b=>b.disabled=true);
    const fb=document.getElementById('quiz-feedback');
    if(idx===p.c){
        qPuntaje++;
        bots[idx].classList.add('correcta');
        fb.className='quiz-feedback ok show';
        fb.textContent='¡Correcto! '+p.ex;
    } else {
        bots[idx].classList.add('incorrecta');
        bots[p.c].classList.add('correcta');
        fb.className='quiz-feedback mal show';
        fb.textContent='No es correcto. '+p.ex;
    }
    const sig=document.getElementById('quiz-btn-sig');
    sig.textContent=qActual<preguntasQuiz.length-1?'Siguiente pregunta →':'Ver resultado';
    sig.className='quiz-btn-sig show';
}
function siguienteQuiz(){
    qActual++;
    if(qActual < preguntasQuiz.length){
        cargarPregunta();
    } else {
        document.getElementById('quiz-opciones').innerHTML = '';
        document.getElementById('quiz-num').textContent = '';
        document.getElementById('quiz-pregunta').textContent = '';
        document.getElementById('quiz-feedback').className = 'quiz-feedback';
        document.getElementById('quiz-btn-sig').className = 'quiz-btn-sig';

        // NUEVO: guardar mejor puntaje en localStorage
        const mejorAnterior = parseInt(localStorage.getItem('mejorPuntajeQuiz') || '0');
        if(qPuntaje > mejorAnterior){
            localStorage.setItem('mejorPuntajeQuiz', qPuntaje);
        }
        const mejor = Math.max(qPuntaje, mejorAnterior);

        const res = document.getElementById('quiz-resultado');
        res.classList.add('show');
        document.getElementById('quiz-puntaje').textContent = `${qPuntaje}/${preguntasQuiz.length}`;

        // NUEVO: mostrar mejor puntaje histórico
        document.getElementById('quiz-msg').innerHTML = `
            ${getMensaje(qPuntaje)}
            <br><br>
            <span style="font-size:0.75rem; color:var(--accent-color); font-weight:600;">
                🏆 Tu mejor puntaje: ${mejor}/${preguntasQuiz.length}
            </span>
        `;
    }
}

// NUEVA función separada para los mensajes
function getMensaje(puntaje){
    const msgs = [
        'Sigue explorando los módulos para conocer más tu cultura.',
        'Buen intento. Repasa el módulo de Música y danzas.',
        '¡Bien! Estás conociendo tu patrimonio cultural.',
        '¡Muy bien! Buen conocimiento de la música del Pacífico.',
        '¡Excelente! Eres un guardián del patrimonio del río Naya.',
        '¡Brillante! Conocimiento profundo de la cultura pacífica.',
        '¡Perfecto! Dominas el patrimonio musical del Pacífico.'
    ];
    return msgs[Math.min(puntaje, msgs.length - 1)];
}
function reiniciarQuiz(){
    document.getElementById('quiz-resultado').classList.remove('show');

}

mes acompañan las danzas de movimiento."},{title:"Festival Petronio Álvarez",content:"Festival dedicado a la música folclórica del Pacífico colombiano, celebrado cada agosto en Cali. Rinde homenaje a Patricio Romano Petronio Álvarez Quintero (1914–1966)."},{title:"Practica lo aprendido",content:"Pon a prueba tu conocimiento sobre la música y danzas del Pacífico colombiano.",isQuiz:true}]},

    const iw=document.getElementById('detailImgWrap');
    if(m.isQuienes){
        dh.className='detail-header quienes-hdr';
        document.getElementById('detailTitle').textContent=m.title;
        document.getElementById('detailSubtitle').textContent=m.subtitle;
        iw.style.display='none';
        document.getElementById('detailDesc').innerHTML='';
        document.getElementById('detailSections').innerHTML=buildQuienesSomos();
        window.scrollTo(0,0); return;
    }
    if(m.isContact){

            if(s.hasAudio){ html+=`<div class="audio-player"><h4>🎵 Reproducir muestra musical</h4><div class="audio-controls"><button class="audio-play-btn" onclick="this.textContent=this.textContent==='▶'?'⏸':'▶'">▶</button><div class="audio-info"><p style="font-weight:600;">Chirimía del Pacífico</p><p>Muestra de audio del territorio</p></div></div></div><p class="audio-pendiente">⏳ Audios en proceso de grabación con la comunidad del río Naya</p>`; }
            if(s.instruments){ html+='<div class="instruments-grid">'; s.instruments.forEach(i=>html+=`<div class="instrument-card"><h5>${i.name}</h5><p>${i.desc}</p></div>`); html+='</div>'; }

grado de licenciatura y desarrollado como investigación de maestría. Esta versión es un desarrollo independiente y de autoría propia, orientado a construir un ecosistema digital de patrimonio inmaterial para las comunidades ribereñas del río Naya.</p></div><div class="detail-section"><h3><span class="section-marker"></span>Territorio y comunidad</h3><p>El río Naya conecta el Valle del Cauca y el Cauca, habitado por comunidades afrodescendientes e indígenas Eperara Siapidara. Puerto Merizalde es el corazón de este proyecto — un territorio de riqueza cultural invaluable que merece ser preservado mediante las herramientas del siglo XXI.</p></div><div class="detail-section"><h3><span class="section-marker"></span>Visión del proyecto</h3><p>Mi Pacífico App aspira a convertirse en un ecosistema digital colaborativo donde las comunidades del litoral sean protagonistas de la preservación de su propio patrimonio inmaterial, accesible desde cualquier dispositivo móvil, incluso sin conexión a internet.</p></div><div class="perfil-cta"><p>¿Quieres colaborar con el proyecto?</p><button onclick="showModule('contact')">Comparte tu historia</button></div>`;

async function enviarFormulario(){
    const name=document.getElementById('f-name').value.trim();
    const email=document.getElementById('f-email').value.trim();
    const cat=document.getElementById('f-cat').value;
    const title=document.getElementById('f-title').value.trim();
    const content=document.getElementById('f-content').value.trim();
    const location=document.getElementById('f-location').value.trim();
    if(!name||!email||!cat||!title||!content){ alert('Por favor completa todos los campos obligatorios (*)'); return; }
    const btn=document.querySelector('.form-submit');
    btn.textContent='Enviando...'; btn.disabled=true;
    try{
        const res=await fetch(FORMSPREE_URL,{ method:'POST', headers:{'Content-Type':'application/json','Accept':'application/json'}, body:JSON.stringify({name,email,categoria:cat,titulo:title,descripcion:content,lugar:location}) });
        if(res.ok){ document.getElementById('formSuccess').classList.add('show'); ['f-name','f-email','f-cat','f-title','f-content','f-location'].forEach(id=>document.getElementById(id).value=''); }
        else { document.getElementById('formError').classList.add('show'); }
    } catch(e){ document.getElementById('formError').classList.add('show'); }
    finally{ btn.textContent='Enviar aporte al patrimonio'; btn.disabled=false; }
}
