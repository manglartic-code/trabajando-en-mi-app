<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
    <meta name="description" content="Mi Pacífico App - Patrimonio digital del litoral Pacífico colombiano">
    <meta name="theme-color" content="#1D9E75">
    <title>Mi Pacífico App - Patrimonio Digital</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #FFF8F0;
            color: #1a1a1a;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .app-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #FFF8F0;
        }

        .app-header {
            background: linear-gradient(to right, #1D9E75, rgba(29, 158, 117, 0.8));
            color: white;
            padding: 1.5rem 1rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .app-header h1 {
            font-size: 1.875rem;
            margin-bottom: 0.25rem;
        }

        .app-header p {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        .app-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 5rem;
            -webkit-overflow-scrolling: touch;
        }

        .modules-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            padding: 1rem;
            max-width: 28rem;
            margin: 0 auto;
        }

        .module-btn {
            position: relative;
            overflow: hidden;
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            font-family: inherit;
        }

        .module-btn:active {
            transform: scale(0.95);
        }

        .module-btn:hover {
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.15);
        }

        .module-btn-gastronomia {
            background: linear-gradient(to bottom right, #fed7aa, #fef3c7);
        }

        .module-btn-medicina {
            background: linear-gradient(to bottom right, #bbf7d0, #d1fae5);
        }

        .module-btn-musica {
            background: linear-gradient(to bottom right, #bfdbfe, #dbeafe);
        }

        .module-btn-oral {
            background: linear-gradient(to bottom right, #fecaca, #fecdd3);
        }

        .module-btn-gastronomia h3 {
            color: #92400e;
        }

        .module-btn-gastronomia p {
            color: #b45309;
        }

        .module-btn-medicina h3 {
            color: #15803d;
        }

        .module-btn-medicina p {
            color: #16a34a;
        }

        .module-btn-musica h3 {
            color: #1e40af;
        }

        .module-btn-musica p {
            color: #2563eb;
        }

        .module-btn-oral h3 {
            color: #7f1d1d;
        }

        .module-btn-oral p {
            color: #dc2626;
        }

        .module-btn h3 {
            font-size: 0.875rem;
            font-weight: 700;
            margin-top: 0.5rem;
        }

        .module-btn p {
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }

        .module-btn-emoji {
            font-size: 2rem;
        }

        .footer-text {
            padding: 1rem;
            text-align: center;
            font-size: 0.75rem;
            color: rgba(26, 26, 26, 0.6);
            display: none;
        }

        .footer-text.show {
            display: block;
        }

        /* Pantalla de detalle */
        .detail-screen {
            display: none;
        }

        .detail-screen.active {
            display: flex;
            flex-direction: column;
        }

        .detail-header {
            background: linear-gradient(to right, #1D9E75, rgba(29, 158, 117, 0.8));
            color: white;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .detail-header button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 0.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .detail-header button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .detail-header-text {
            min-width: 0;
            flex: 1;
        }

        .detail-header h1 {
            font-size: 1.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .detail-header p {
            font-size: 0.75rem;
            opacity: 0.9;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .detail-image {
            width: 100%;
            height: 18rem;
            overflow: hidden;
            background-color: #d1d5db;
        }

        .detail-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .detail-content {
            padding: 1rem;
            space-y: 1.5rem;
            max-width: 42rem;
            margin: 0 auto;
        }

        .detail-description {
            background: linear-gradient(to right, rgba(29, 158, 117, 0.1), rgba(29, 158, 117, 0.05));
            border-radius: 0.75rem;
            padding: 1rem;
            border: 1px solid rgba(29, 158, 117, 0.2);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .detail-section {
            padding-bottom: 1rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid #e8dcc8;
        }

        .detail-section:last-child {
            border-bottom: none;
        }

        .detail-section h3 {
            font-size: 1.125rem;
            color: #1D9E75;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .detail-section-marker {
            width: 0.25rem;
            height: 1.5rem;
            background-color: #1D9E75;
            border-radius: 9999px;
        }

        .detail-section p {
            font-size: 0.875rem;
            color: rgba(26, 26, 26, 0.75);
            line-height: 1.6;
            margin-left: 0.75rem;
        }

        .detail-button {
            width: 100%;
            background-color: #1D9E75;
            color: white;
            border: none;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: background-color 0.2s;
        }

        .detail-button:hover {
            background-color: rgba(29, 158, 117, 0.9);
        }

        .detail-button:active {
            transform: scale(0.98);
        }

        @media (min-width: 640px) {
            .modules-grid {
                gap: 1rem;
                padding: 1.5rem;
            }

            .module-btn {
                padding: 1.5rem;
            }

            .module-btn-emoji {
                font-size: 2.5rem;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Pantalla principal -->
        <div id="homeScreen" class="home-screen">
            <header class="app-header">
                <div>
                    <h1>Mi Pacífico App</h1>
                    <p>Patrimonio digital del litoral</p>
                    <p style="font-size: 0.7rem; margin-top: 0.25rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">Mg. LUIS EDUARDO RODALLEGA</p>
                </div>
            </header>

            <div class="app-content">
                <div class="modules-grid">
                    <button class="module-btn module-btn-gastronomia" onclick="showModule('gastronomia')">
                        <div class="module-btn-emoji">🍽️</div>
                        <h3>Gastronomía</h3>
                        <p>Recetas y sabores</p>
                    </button>

                    <button class="module-btn module-btn-medicina" onclick="showModule('medicina')">
                        <div class="module-btn-emoji">🌿</div>
                        <h3>Medicina</h3>
                        <p>Plantas ancestrales</p>
                    </button>

                    <button class="module-btn module-btn-musica" onclick="showModule('musica')">
                        <div class="module-btn-emoji">🎵</div>
                        <h3>Música</h3>
                        <p>Danzas y ritmos</p>
                    </button>

                    <button class="module-btn module-btn-oral" onclick="showModule('oral')">
                        <div class="module-btn-emoji">📖</div>
                        <h3>Tradición Oral</h3>
                        <p>Historias de mayores</p>
                    </button>
                </div>

                <div class="footer-text show">
                    <p>Río Naya · Valle del Cauca</p>
                    <p style="color: #1D9E75; font-weight: 600; margin-top: 0.5rem;">✓ Patrimonio Digital Preservado</p>
                </div>
            </div>
        </div>

        <!-- Pantalla de detalle -->
        <div id="detailScreen" class="detail-screen">
            <div class="detail-header">
                <button onclick="goHome()">←</button>
                <div class="detail-header-text">
                    <h1 id="detailTitle">Título</h1>
                    <p id="detailSubtitle">Subtítulo</p>
                </div>
            </div>

            <div class="detail-image">
                <img id="detailImage" src="" alt="Módulo">
            </div>

            <div class="detail-content">
                <div class="detail-description" id="detailDescription"></div>
                <div id="detailSections"></div>
                <button class="detail-button" onclick="goHome()">← Volver al inicio</button>
            </div>
        </div>
    </div>

    <script>
        const modules = {
            gastronomia: {
                title: "Gastronomía",
                subtitle: "Sabores del litoral Pacífico",
                image: "https://d2xsxph8kpxj0f.cloudfront.net/310519663326396830/m6VbiQYSKRgSqs3SasGvdL/gastronomia-pacifico-aCWEw74HqkVaQQMWHxvHmQ.webp",
                description: "La cocina del Pacífico es soberanía alimentaria. Recetas documentadas con las comunidades del río Naya, usando ingredientes locales como el naidí, el chontaduro y las hierbas de azotea.",
                sections: [
                    {
                        title: "Platos Emblemáticos",
                        content: "El encocao (pescado en leche de coco), la sopa de piangua, el tapao de pescado, y el arroz con piangua son los platos bandera de la región. Cada uno cuenta historias de tradición y conexión con el manglar."
                    },
                    {
                        title: "Ingredientes Locales",
                        content: "Naidí (fruto de palma), chontaduro, piangua (molusco de manglar), pescado de río y mar. Todos ellos son parte de la identidad culinaria del territorio."
                    },
                    {
                        title: "Hierbas de Azotea",
                        content: "Cilantro cimarrón, poleo, albahaca negra, orégano de hoja ancha. Son el alma de la sazón pacífica, cultivadas en espacios elevados para protegerlas de inundaciones."
                    }
                ]
            },
            medicina: {
                title: "Medicina Tradicional",
                subtitle: "Plantas y saberes ancestrales",
                image: "https://d2xsxph8kpxj0f.cloudfront.net/310519663326396830/m6VbiQYSKRgSqs3SasGvdL/medicina-pacifico-ihaj72hBQWgcj7wD4QxjEJ.webp",
                description: "Las parteras, los sabedores y las plantas de azotea son el sistema de salud ancestral del Pacífico. Este módulo recoge conocimientos de etnobotánica del río Naya.",
                sections: [
                    {
                        title: "La Azotea: Espacio de Vida",
                        content: "Espacio elevado donde las mujeres siembran plantas medicinales y condimentos. Protege la biodiversidad de inundaciones y plagas, y es centro de transmisión de saberes generacionales."
                    },
                    {
                        title: "Plantas Medicinales",
                        content: "Poleo para dolores estomacales, albahaca para limpiezas espirituales, paico como antiparasitario natural, verbena para la sangre y presión. Cada planta tiene un propósito específico en la medicina tradicional."
                    },
                    {
                        title: "Sabedores y Parteras",
                        content: "Figuras clave que preservan el conocimiento etnobotánico. Su labor es fundamental para mantener viva la tradición de curación y cuidado de la salud comunitaria."
                    }
                ]
            },
            musica: {
                title: "Música y Danzas",
                subtitle: "Expresiones ancestrales del Pacífico",
                image: "https://d2xsxph8kpxj0f.cloudfront.net/310519663326396830/m6VbiQYSKRgSqs3SasGvdL/musica-pacifico-5GL5FrYbW4EkRxMi5mFMXJ.webp",
                description: "Las músicas de marimba, los cantos y danzas tradicionales del Pacífico Sur recogen en sus ritmos la herencia africana, indígena y española, creando una identidad sonora única.",
                sections: [
                    {
                        title: "Conjunto de Marimba",
                        content: "Instrumentos: Marimba de chonta (el piano de la selva), cununos (macho y hembra), bombos, guasás. Ritmos: Currulao (el más sagrado), Bambuco Viejo, Patacoré, Berejú, Juga, Bunde. Cada ritmo tiene su propia historia y significado cultural."
                    },
                    {
                        title: "Danzas Tradicionales",
                        content: "Currulao: danza de cortejo con pañuelos. Juga: variante del currulao con coreografías circulares. Abozao: ritmo más frenético. Cada danza es una forma de comunicación y celebración comunitaria."
                    },
                    {
                        title: "Festival Petronio Álvarez",
                        content: "El evento más importante de la cultura afrocolombiana, celebrado cada agosto en Cali en honor a Petronio Álvarez Quintero. Reúne a músicos y danzadores de toda la región del Pacífico."
                    }
                ]
            },
            oral: {
                title: "Tradición Oral",
                subtitle: "Historias y voces de los mayores",
                image: "https://d2xsxph8kpxj0f.cloudfront.net/310519663326396830/m6VbiQYSKRgSqs3SasGvdL/tradicion-oral-pacifico-Xphd3ZRNC5rW8EYPb6dxuL.webp",
                description: "Los mayores del Naya son archivos vivos. Este módulo recoge historias, mitos y narraciones del territorio, preservando la oralidad como mecanismo de resistencia cultural.",
                sections: [
                    {
                        title: "Mitos y Leyendas",
                        content: "La Tunda (entidad que 'entunda' a los niños), el Riviel (espíritu que viaja en canoa con luz en el río), la Madremonte (protectora de bosques y ríos). Cada mito es una forma de entender y proteger el territorio."
                    },
                    {
                        title: "Narrativas Ancestrales",
                        content: "Cantos de boga (mientras se navega el río), décimas (poesía cantada), arrullos (cantos a los santos y niños). Son formas de transmisión de conocimiento, valores y memoria colectiva."
                    },
                    {
                        title: "Río Naya: Eje de Vida",
                        content: "Conecta el Valle del Cauca y el Cauca, habitado por comunidades afrodescendientes e indígenas (Eperara Siapidara). El río es más que geografía: es identidad, sustento y espíritu."
                    }
                ]
            }
        };

        function showModule(moduleId) {
            const module = modules[moduleId];
            document.getElementById('homeScreen').style.display = 'none';
            document.getElementById('detailScreen').classList.add('active');
            
            document.getElementById('detailTitle').textContent = module.title;
            document.getElementById('detailSubtitle').textContent = module.subtitle;
            document.getElementById('detailImage').src = module.image;
            document.getElementById('detailDescription').textContent = module.description;
            
            const sectionsHtml = module.sections.map(section => `
                <div class="detail-section">
                    <h3><span class="detail-section-marker"></span>${section.title}</h3>
                    <p>${section.content}</p>
                </div>
            `).join('');
            
            document.getElementById('detailSections').innerHTML = sectionsHtml;
            window.scrollTo(0, 0);
        }

        function goHome() {
            document.getElementById('detailScreen').classList.remove('active');
            document.getElementById('homeScreen').style.display = 'block';
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
